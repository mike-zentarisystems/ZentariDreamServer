name: Lint Prometheus Config

on:
  push:
    paths:
      - 'dream-server/config/prometheus/**'
  pull_request:
    paths:
      - 'dream-server/config/prometheus/**'

permissions:
  contents: read

jobs:
  lint:
    name: Validate prometheus.yml
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run promtool check config
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dream-server/config/prometheus:/prometheus:ro" \
            prom/prometheus:v3.3.1 \
            promtool check config /prometheus/prometheus.yml

      - name: Check alert rules if present
        run: |
          if ls dream-server/config/prometheus/rules/*.yml 2>/dev/null; then
            docker run --rm \
              -v "${{ github.workspace }}/dream-server/config/prometheus:/prometheus:ro" \
              prom/prometheus:v3.3.1 \
              promtool check rules /prometheus/rules/*.yml
          else
            echo "No alert rule files found, skipping."
          fi
