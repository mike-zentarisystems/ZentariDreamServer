services:
  vaultwarden:
    image: vaultwarden/server:1.32-alpine
    container_name: dream-vaultwarden
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN:?Set VAULTWARDEN_ADMIN_TOKEN in .env}
      - SIGNUPS_ALLOWED=${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      - DOMAIN=http://localhost:${VAULTWARDEN_PORT:-8222}
      - LOG_LEVEL=warn
      - EXTENDED_LOGGING=true
      - LOG_FILE=/data/vaultwarden.log
      - WEBSOCKET_ENABLED=true
    volumes:
      - vaultwarden-data:/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${VAULTWARDEN_PORT:-8222}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/alive || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vaultwarden-data:
