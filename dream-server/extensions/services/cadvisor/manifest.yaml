schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: cadvisor
  name: cAdvisor (Container Metrics)
  container_name: dream-cadvisor
  host_env: CADVISOR_HOST
  default_host: cadvisor
  port: 8080
  external_port_env: CADVISOR_PORT
  external_port_default: 8083
  health: /healthz
  ui_path: /
  type: docker
  gpu_backends: [cpu, none]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: CADVISOR_PORT
      required: false
      secret: false
      description: External port for cAdvisor UI (default 8083)
