services:
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.9.1
    container_name: dream-node-exporter
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - --path.rootfs=/host
      - --collector.disable-defaults
      - --collector.cpu
      - --collector.meminfo
      - --collector.diskstats
      - --collector.filesystem
      - --collector.netdev
      - --collector.loadavg
      - --collector.hwmon
      - --collector.thermal_zone
      - --web.listen-address=:9100
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9100/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
