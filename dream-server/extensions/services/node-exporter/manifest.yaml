schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: node-exporter
  name: Node Exporter (Host Metrics)
  container_name: dream-node-exporter
  host_env: NODE_EXPORTER_HOST
  default_host: node-exporter
  port: 9100
  external_port_env: NODE_EXPORTER_PORT
  external_port_default: 9100
  health: /
  ui_path: /metrics
  type: docker
  gpu_backends: [cpu, none]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: NODE_EXPORTER_PORT
      required: false
      secret: false
      description: External port for Node Exporter metrics (default 9100)
