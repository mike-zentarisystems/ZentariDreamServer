services:
  grafana:
    image: grafana/grafana:11.6.1
    container_name: dream-grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Root URL reflects the Caddy reverse proxy entry point (subdomain routing)
      - GF_SERVER_ROOT_URL=http://grafana.localhost
      - GF_SERVER_HTTP_PORT=3000
      # Authelia handles auth at the Caddy layer; Grafana login is still available as fallback
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../../config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${GRAFANA_PORT:-3007}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  grafana-data:
