schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: docling
  name: Docling (Document Ingestion)
  container_name: dream-docling
  host_env: DOCLING_HOST
  default_host: docling
  port: 5001
  external_port_env: DOCLING_PORT
  external_port_default: 5001
  health: /health
  ui_path: /
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: DOCLING_PORT
      required: false
      secret: false
      description: External port for Docling API (default 5001)
