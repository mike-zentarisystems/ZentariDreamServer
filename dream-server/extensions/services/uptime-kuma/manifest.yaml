schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: uptime-kuma
  name: Uptime Kuma (Status Monitor)
  container_name: dream-uptime-kuma
  host_env: UPTIME_KUMA_HOST
  default_host: uptime-kuma
  port: 3001
  external_port_env: UPTIME_KUMA_PORT
  external_port_default: 3008
  health: /
  ui_path: /
  type: docker
  gpu_backends: [cpu, none]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: UPTIME_KUMA_PORT
      required: false
      secret: false
      description: External port for Uptime Kuma UI (default 3008)
