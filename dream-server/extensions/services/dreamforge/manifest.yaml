schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: dreamforge
  name: DreamForge
  aliases: [forge, coder]
  container_name: dream-dreamforge
  default_host: dreamforge
  port: 3010
  external_port_env: DREAMFORGE_PORT
  external_port_default: 3010
  health: /health
  ui_path: /
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: [llama-server]
  description: >
    Local agentic coding assistant powered by the DreamForge Rust engine.
    40+ tools for file editing, bash execution, search, and MCP integration.
    Features RAG pipeline, persistent memory, secret scanning, and enterprise RBAC.

env_vars:
  - key: DREAMFORGE_PORT
    default: "3010"
    description: HTTP server port
  - key: DREAMFORGE_API_KEY
    default: ""
    description: API key for authentication (auto-generated if empty)
  - key: DREAMFORGE_WORKSPACE
    default: /workspace
    description: Default workspace directory
  - key: DREAMFORGE_PERMISSION_MODE
    default: default
    description: "Permission mode: default, plan, accept_edits, full_auto"
  - key: DREAMFORGE_MAX_TURNS
    default: "200"
    description: Maximum agent turns per query
  - key: DREAMFORGE_MODEL
    default: ""
    description: Override model name (auto-detected from LLM server if empty)
  - key: DREAMFORGE_DATA_DIR
    default: /data/dreamforge
    description: Persistent data directory for memory and sessions
  - key: DREAMFORGE_RAG_ENABLED
    default: "false"
    description: Enable RAG pipeline (requires qdrant + embeddings services)
  - key: DREAMFORGE_COMPACT_THRESHOLD
    default: "10000"
    description: Token threshold for automatic context compaction
  - key: DREAMFORGE_LLM_API_URL
    default: "http://llama-server:8080/v1"
    description: LLM API endpoint override (use host.docker.internal:1234/v1 for LM Studio)

features:
  - id: agentic-coding
    name: Agentic Coding
    description: 40+ tools for file editing, bash, search, MCP integration
    icon: Code
    category: developer-tools
    requirements:
      services: [llama-server]
    enabled_services_any: [dreamforge]
    setup_time: Ready
    priority: 10
    gpu_backends: [all]
  - id: rag-pipeline
    name: RAG Pipeline
    description: Document ingestion with TEI embeddings and Qdrant vector search
    icon: Database
    category: developer-tools
    requirements:
      services: [qdrant, embeddings]
    enabled_services_any: [dreamforge]
    setup_time: Ready
    priority: 20
    gpu_backends: [all]
