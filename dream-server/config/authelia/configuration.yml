---
server:
  host: 0.0.0.0
  port: 9091

log:
  level: info

jwt_secret: '${AUTHELIA_JWT_SECRET}'

# After login, redirect to the dashboard
default_redirection_url: http://dashboard.localhost

totp:
  issuer: zentari-dreamserver.local

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 1
      salt_length: 16
      parallelism: 8
      memory: 64

access_control:
  default_policy: deny
  rules:
    # Allow Caddy health check without auth
    - domain: "localhost"
      resources:
        - "^/healthz$"
      policy: bypass
    # Authelia portal itself — no auth needed
    - domain: "auth.localhost"
      policy: bypass
    # SearXNG is internal-only — allow without SSO
    - domain: "search.localhost"
      policy: bypass
    # Hermes uses its own bearer token auth
    - domain: "hermes.localhost"
      policy: bypass
    # All other *.localhost subdomains require one-factor auth
    - domain: "*.localhost"
      policy: one_factor

session:
  name: authelia_session
  secret: '${AUTHELIA_SESSION_SECRET}'
  expiration: 3600
  inactivity: 900
  # .localhost covers all subdomains (chat.localhost, dashboard.localhost, etc.)
  domain: localhost

regulation:
  max_retries: 3
  find_time: 120
  ban_time: 300

storage:
  local:
    path: /var/lib/authelia/db.sqlite3
  encryption_key: '${AUTHELIA_STORAGE_ENCRYPTION_KEY}'

notifier:
  disable_startup_check: false
  filesystem:
    filename: /config/notification.txt
