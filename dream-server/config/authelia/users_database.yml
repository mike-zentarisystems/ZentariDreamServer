---
# Authelia local user database.
# The password hash is generated by the installer (Phase 06).
# To manually regenerate: docker run --rm authelia/authelia:4.38 authelia crypto hash generate argon2 --password 'YourPassword'
users:
  admin:
    displayname: "Zentari Admin"
    password: "AUTHELIA_HASH_PLACEHOLDER"
    email: admin@zentari-dreamserver.local
    groups:
      - admins
