  <path class="blueLine" d="M245 288 C300 288 325 254 385 254"/>
  <path class="blueLine" d="M245 300 C305 315 330 329 385 329"/>
  <path class="line" d="M645 254 C715 254 735 260 805 260"/>
  <path class="line" d="M1055 260 C1115 260 1150 260 1220 260"/>
  <path class="line" d="M645 404 C715 404 735 350 805 350"/>
  <path class="line" d="M515 565 C520 500 775 465 930 295"/>
  <path class="line" d="M645 275 C720 420 760 575 865 594"/>
  <path class="line" d="M1125 594 C1170 510 1195 365 1220 282"/>
  <path class="line" d="M1125 669 C1170 648 1220 650 1290 669"/>
  <path class="line" d="M1125 595 C1180 625 1220 679 1290 744"/>
  <path class="line" d="M545 679 C655 679 755 603 865 603"/>
  <path class="line" d="M725 679 C770 679 820 680 865 680"/>
  <path class="line" d="M645 254 C790 455 1040 550 1290 594"/>
  <path class="line" d="M645 254 C790 500 1040 620 1290 669"/>
  <path class="line" d="M645 254 C790 570 1050 700 1290 744"/>
  <path class="dashLine" d="M475 930 C650 840 775 760 865 669"/>
  <path class="dashLine" d="M680 930 C810 835 920 770 995 715"/>
  <path class="dashLine" d="M885 930 C935 760 1020 520 1220 300"/>
