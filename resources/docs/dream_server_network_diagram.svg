  <path class="dashLine" d="M1455 930 C1395 810 1310 480 1360 380"/>

  <!-- Legend -->
  <rect x="70" y="900" width="210" height="148" rx="18" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="95" y="930" class="label">Legend</text>
  <line x1="95" y1="958" x2="155" y2="958" class="blueLine"/><text x="170" y="963" class="small">User access</text>
  <line x1="95" y1="990" x2="155" y2="990" class="line"/><text x="170" y="995" class="small">Service call</text>
  <line x1="95" y1="1022" x2="155" y2="1022" class="dashLine"/><text x="170" y="1027" class="small">Telemetry/control</text>

  <text x="70" y="1110" class="tiny">Generated from ARCHITECTURE.md v2.4.0. Services bind to localhost by default. Optional hybrid mode routes through LiteLLM for cloud fallback.</text>
